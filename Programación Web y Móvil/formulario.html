<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo de la Empresa" width="100">
        <h1>Registro de Usuarios</h1>
        <p>Por favor, completa el siguiente formulario para registrarte, ¡pronto estaremos comunicándonos contigo!:</p>
        <link rel="stylesheet" href="css/stylesform.css">
    </header>
    <main>
        <form action="registro.html" method="post">
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for = "Telefono">Teléfono:</label><br>
            <input type="tel" id="telefono" name="telefono" required><br><br>

            <label for="email">Correo Electrónico:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="fecha">Fecha reserva:</label><br>
            <input type="date" id="fecha" name="fecha" required><br><br>

            <input type="submit" value="Enviar"><br><br>
        </form>
    </main>
    <footer>
        <button><a href="index.html">Volver al Inicio</a></button><br>
        <button><a href="productos.html">Ver Servicios</a></button>
        <p>&copy; Todos los derechos reservados.</p>
    </footer>
</body>
</html>
