<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="css/stylesform.css">
</head>
<body>
    <header>
        <img src="img/Logo C&S Transportes SAS.jpg.jpeg" alt="Logo de la Empresa" class="logo">
        <h1>Registro de Usuarios</h1>
        <nav class="menu">
            <a href="index.html" class="inicio">Inicio</a>
            <a href="formulario.html" class="formulario">Formulario</a>
            <a href="servicios.html" class="servicios">Servicios</a>
            <a href="login.html" class="login" id="btnLogin">Login</a>
            <span id="usuarioActivo" class="usuario"></span>
            <button id="btnLogout" class="logout" style="display: none;">Cerrar Sesión</button>
        </nav>
    </header>
    <p class="subtitle">Por favor, completa el siguiente formulario para registrarte, ¡pronto estaremos comunicándonos contigo para brindarte una mejor asesoría!:</p>
    <main>
        <form action="registro.html" method="post">
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for="telefono">Teléfono:</label><br>
            <input type="tel" id="telefono" name="telefono" required><br><br>

            <label for="email">Correo Electrónico:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Contraseña:</label><br>
            <input type="password" id="password" name="password" required><br><br>


            <label for="fechaReserva">Fecha de Reserva:</label><br>
            <input type="date" id="fechaReserva" name="fechaReserva" required><br><br>

            <input type="submit" value="Registrar"><br><br>
        </form>
    </main>
    <footer>
        <button><a href="index.html">Volver al Inicio</a></button><br>
        <button><a href="servicios.html">Ver Servicios</a></button><br>
        <button><a href="contacto.html">Contáctanos</a></button><br>
        
        <div class="copy">
            <br><p>&copy; Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="js/login.js"></script>
</body>
</html>
