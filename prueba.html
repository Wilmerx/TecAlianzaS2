<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios JavaScript</title>
</head>
<body>
    <section id="ejercicio1">
        <h1>1. Contar</h1>
        <input type="number" id="numeroContar" placeholder="Ingresa un número">
        <button id="btnContar">Contar</button>
        <p id="resultadoContar"></p>
    </section>

    <section id="ejercicio2">
        <h1>2. Sumar</h1>
        <input type="number" id="numero1Sumar" placeholder="Número 1">
        <input type="number" id="numero2Sumar" placeholder="Número 2">
        <button id="btnSumar">Sumar</button>
        <p id="resultadoSumar"></p>
    </section>

    <section id="ejercicio3">
        <h1>3. Par o Impar</h1>
        <input type="number" id="numeroParImpar" placeholder="Ingresa un número">
        <button id="btnParImpar">Verificar</button>
        <p id="resultadoParImpar"></p>
    </section>

    <section id="ejercicio4">
        <h1>4. Adivina el Número</h1>
        <input type="number" id="numeroUsuario" placeholder="Ingresa un número del 1 al 100">
        <button id="btnAdivinar">Adivinar</button>
        <p id="resultadoAdivinar"></p><br>
        <p id="intentosPantalla"></p><br>
        <button id="btnReiniciar">Reiniciar Juego</button>
    </section>

    <section id="ejercicio5">
        <h1>5. Piedra, Papel o Tijera</h1>
        <button id="btnPiedra">Piedra</button>
        <button id="btnPapel">Papel</button>
        <button id="btnTijera">Tijera</button>
        <p id="resultadoJuego"></p>
    </section>

    <script src="js/prueba.js"></script>
</body>
</html>
